# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: spotr

before:
  hooks:
    - go mod download
    - go test ./...

builds:
  - id: spotr
    main: .
    binary: spotr
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: spotr
    ids:
      - spotr
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - readme.md
      - LICENSE
      - templates/**/*
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

homebrew_casks:
  - name: spotr
    ids:
      - spotr
    binaries:
      - spotr
    repository:
      owner: Yokanater
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: https://spotr.info
    description: Workout logging for nerds on the terminal
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr",
                           args: ["-dr", "com.apple.quarantine", "#{staged_path}/spotr"]
          end
    caveats: |
      spotr stores its database in your operating system's user data directory.
      Set SPOTR_DATA_DIR or pass --data-dir to use a custom location.

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  footer: |

    ---

    Released by [GoReleaser](https://github.com/goreleaser/goreleaser).
