name: Bug report
description: Report reproducible behavior that is not working as expected
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve spotr. Do not attach your spotr.db file.
  - type: input
    id: version
    attributes:
      label: spotr version
      description: Run `spotr --version`.
      placeholder: v0.2.0
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options: [macOS, Linux, Windows, Other]
    validations:
      required: true
  - type: input
    id: terminal
    attributes:
      label: Terminal
      placeholder: Terminal.app, iTerm2, Windows Terminal, kitty...
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the smallest reliable sequence of actions.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues.
          required: true
        - label: I removed private workout data from logs and screenshots.
          required: true
